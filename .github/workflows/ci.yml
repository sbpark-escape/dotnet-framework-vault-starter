name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\dotnet-framework-vault-starter.sln

      - name: Build
        run: dotnet build .\dotnet-framework-vault-starter.sln --configuration Release --no-restore

      - name: Tests
        run: dotnet run --configuration Release --project .\tests\DotNetFrameworkVaultStarter.Tests\DotNetFrameworkVaultStarter.Tests.csproj

      - name: Markdown link validation
        shell: pwsh
        run: .\scripts\Test-MarkdownLinks.ps1
