name: Documentation improvement
description: Improve README, examples, or operational docs.
title: "Docs: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Do not include real Vault addresses, tokens, RoleId values, SecretId values, connection strings, internal domains, or secret values.
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Which document needs work?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or structure
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: Any examples use dummy values only.
          required: true
