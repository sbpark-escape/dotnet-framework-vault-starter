name: Feature request
description: Suggest a practical helper feature.
title: "Feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Do not include real Vault addresses, tokens, RoleId values, SecretId values, connection strings, internal domains, or secret values.
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What legacy .NET Framework scenario would this help?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the helper small and easy to adopt.
        - label: This does not require logging or storing secret values.
        - label: This request uses dummy values only.
